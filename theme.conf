[General]
# Основной цвет текста - тускло-золотой акцент (цвет надписей в игре)
ColorLight="#D4A359"

# Цвет заблюренной панели - глубокий темный сигаретно-пороховой оттенок
ColorDark="#120C0A"

# Акцентный цвет - ржавое игровое золото (для контуров и фокуса полей)
ColorAccent="#C2913F"

# Фон полей ввода - очень темный, цвет сукна на столе Дилера
ColorInputBg="#140F0A"

# Настройки шрифта (Новый классический шрифт Garamond)
Font="Garamond"
FontSize="22"

# Настройки фона (Ваш скриншот с Дилером)
Background="backgrounds/background.jpg"

# Имя игрока по умолчанию на экране авторизации
defaultUser="PLAYER"
